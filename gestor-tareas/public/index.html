<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Gestor de Tareas</title>
</head>
<body>
  
  <div class="container">
    <h1 id="txtS">Mis tareas</h1>
    <div class="input-row">
      <input type="text" id="nuevaTarea" placeholder="Escribe una tarea..." />
      <button class="add-btn" onclick="agregarTarea()">Agregar</button>
    </div>
    <ul id="listaTareas"></ul>
    <p class="empty" id="vacio" style="display:none">No hay tareas aún.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
